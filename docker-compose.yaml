# nginx proxy address - http://172.17.0.1:3000

name: umami
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  app:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: umami-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
      DATABASE_URL: postgresql://${DB_USER_NAME:-umami}:${DB_USER_PASS:-changeme_db_password}@umami-db:5432/${DB_CREATE_DATABASE_NAME:-umami}
      DATABASE_TYPE: postgresql
      APP_SECRET: ${APP_SECRET_KEY:-changeme_secret_key_min_32_chars}
    ports:
      - '172.17.0.1:3000:3000'
    depends_on:
      umami-db:
        condition: service_healthy
    networks:
      - umami
      - proxy
      - cloudflare
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://umami-app:3000'
      - 'cloudflare.hostname=umami.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.umami-app.entrypoints=http'
      - 'traefik.http.routers.umami-app-secure.tls=true'
      - 'traefik.http.routers.umami-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.umami-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.umami-app.middlewares=umami-app-https-redirect'
      - 'traefik.http.routers.umami-app-secure.entrypoints=https'
      - 'traefik.http.routers.umami-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.umami-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.umami-app-secure.service=umami-app'
      - 'traefik.http.services.umami-app.loadbalancer.server.port=3000'

  umami-db:
    image: postgres:latest
    container_name: umami-db
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: umami-db
      POSTGRES_DB: ${DB_CREATE_DATABASE_NAME:-umami}
      POSTGRES_USER: ${DB_USER_NAME:-umami}
      POSTGRES_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
    volumes:
      - './volumes/data/db/postgres/umami:/var/lib/postgresql/data'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - umami

networks:
  umami:
    name: umami
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
